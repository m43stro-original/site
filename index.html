<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M43STRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        .cursor.hover {
            transform: scale(2.5);
            background: rgba(255, 255, 255, 0.1);
            border-color: transparent;
        }

        /* Animated Background Gradient */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 0, 150, 0.2) 0%, transparent 40%);
            z-index: -1;
            animation: gradientShift 15s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Noise Overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9000;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* First Screen - Hero */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            perspective: 1000px;
        }

        .hero-title {
            font-size: clamp(3rem, 15vw, 12rem);
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
            display: flex;
            gap: 0.1em;
        }

        .hero-letter {
            display: inline-block;
            position: relative;
            background: linear-gradient(
                135deg,
                #00c6ff 0%,
                #0072ff 25%,
                #7b4397 50%,
                #dc2430 75%,
                #ff512f 100%
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 4s ease infinite, floatLetter 3s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 30px rgba(0, 198, 255, 0.5));
        }

        .hero-letter:nth-child(even) {
            animation-delay: -0.5s;
        }

        .hero-letter:nth-child(odd) {
            animation-delay: -1s;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes floatLetter {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(10deg); }
        }

        .hero-letter:hover {
            transform: translateY(-30px) scale(1.2) rotateY(15deg);
            filter: drop-shadow(0 20px 40px rgba(0, 198, 255, 0.8));
            animation-play-state: paused;
        }

        /* Second Screen - Content */
        .content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            position: relative;
        }

        .content-text {
            font-size: clamp(1rem, 2vw, 1.5rem);
            text-align: center;
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.9);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.5s;
            background: linear-gradient(90deg, #fff, rgba(255, 255, 255, 0.7), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease forwards, shimmer 3s linear infinite;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.8s;
        }

        .social-link {
            position: relative;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 198, 255, 0.3),
                rgba(123, 67, 151, 0.3),
                transparent
            );
            transition: left 0.6s ease;
        }

        .social-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(135deg, #00c6ff, #7b4397);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: -1;
            border-radius: 8px;
        }

        .social-link:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: transparent;
            box-shadow: 
                0 10px 30px rgba(0, 198, 255, 0.4),
                0 0 60px rgba(123, 67, 151, 0.3);
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link:hover::after {
            width: 100%;
            left: 0;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatParticle 15s infinite;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title {
                gap: 0.05em;
            }
            
            .social-links {
                gap: 1rem;
            }
            
            .social-link {
                padding: 0.8rem 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <!-- Background Elements -->
    <div class="bg-gradient"></div>
    <div class="noise"></div>
    <div class="particles" id="particles"></div>

    <!-- First Screen -->
    <section class="hero">
        <h1 class="hero-title">
            <span class="hero-letter" data-letter="M">M</span>
            <span class="hero-letter" data-letter="4">4</span>
            <span class="hero-letter" data-letter="3">3</span>
            <span class="hero-letter" data-letter="S">S</span>
            <span class="hero-letter" data-letter="T">T</span>
            <span class="hero-letter" data-letter="R">R</span>
            <span class="hero-letter" data-letter="O">O</span>
        </h1>
    </section>

    <!-- Second Screen -->
    <section class="content">
        <p class="content-text">
            Создаю цифровые решения на стыке искусства и технологий. 
            Каждый проект — это уникальное путешествие в мир инноваций и стиля.
        </p>
        
        <div class="social-links">
            <a href="#" class="social-link magnetic" data-text="Telegram">Telegram</a>
            <a href="#" class="social-link magnetic" data-text="GitHub">GitHub</a>
            <a href="#" class="social-link magnetic" data-text="Twitter">Twitter</a>
            <a href="mailto:hello@m43stro.com" class="social-link magnetic" data-text="Email">Email</a>
        </div>
    </section>

    <script>
        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        const hoverElements = document.querySelectorAll('a, .hero-letter');

        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let dotX = 0, dotY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            const speed = 0.15;
            const dotSpeed = 0.5;
            
            cursorX += (mouseX - cursorX) * speed;
            cursorY += (mouseY - cursorY) * speed;
            dotX += (mouseX - dotX) * dotSpeed;
            dotY += (mouseY - dotY) * dotSpeed;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            cursorDot.style.left = dotX + 'px';
            cursorDot.style.top = dotY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        hoverElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // Magnetic Effect
        const magneticElements = document.querySelectorAll('.magnetic');
        
        magneticElements.forEach(el => {
            el.addEventListener('mousemove', (e) => {
                const rect = el.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                el.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px) scale(1.05)`;
            });
            
            el.addEventListener('mouseleave', () => {
                el.style.transform = 'translate(0, 0) scale(1)';
            });
        });

        // Generate Particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            
            const colors = ['#00c6ff', '#7b4397', '#dc2430', '#ff512f'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
            
            particlesContainer.appendChild(particle);
        }

        // Parallax on Scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const letters = document.querySelectorAll('.hero-letter');
            
            letters.forEach((letter, index) => {
                const speed = 0.2 + (index * 0.05);
                letter.style.transform = `translateY(${scrolled * speed}px)`;
            });
        });

        // Letter hover glow effect
        const letters = document.querySelectorAll('.hero-letter');
        letters.forEach(letter => {
            letter.addEventListener('mouseenter', () => {
                letters.forEach(l => {
                    if (l !== letter) {
                        l.style.filter = 'drop-shadow(0 0 10px rgba(0, 198, 255, 0.2)) blur(2px)';
                    }
                });
            });
            
            letter.addEventListener('mouseleave', () => {
                letters.forEach(l => {
                    l.style.filter = 'drop-shadow(0 0 30px rgba(0, 198, 255, 0.5))';
                });
            });
        });
    </script>
</body>
</html>
